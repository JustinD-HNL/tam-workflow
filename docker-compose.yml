services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tamworkflow
      POSTGRES_PASSWORD: tamworkflow
      POSTGRES_DB: tamworkflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamworkflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tamworkflow:tamworkflow@db:5432/tamworkflow
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ${HOME}/.config/gcloud:/app/gcloud:ro
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.api.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
